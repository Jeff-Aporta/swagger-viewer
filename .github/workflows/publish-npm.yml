name: Publish npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Versión a publicar (debe coincidir con package.json)"
        required: true
        default: "0.1.5"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@jeff-aporta"

      - name: Verificar versión
        run: |
          PKG=$(node -p "require('./package.json').version")
          if [ "$PKG" != "${{ github.event.inputs.tag }}" ]; then
            echo "package.json ($PKG) ≠ tag solicitado (${{ github.event.inputs.tag }})"
            exit 1
          fi

      - run: npm ci
      - run: npm run build
      - run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
