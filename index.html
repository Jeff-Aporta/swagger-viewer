        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;

        user-select: none;

      html[data-mui-color-scheme="light"] .isa-app-boot-watermark {

        filter: grayscale(1) brightness(0.85);
      }

        0%, 100% {
          transform: translateY(0);
          box-shadow: 0 0 18px rgba(0, 229, 255, 0.16);
        }

        0% { transform: translateX(-130%); }
